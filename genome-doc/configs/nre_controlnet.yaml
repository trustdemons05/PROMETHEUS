# NRE — Neural Re-Rendering Engine Configuration
# Architecture: ControlNet adapter on Stable Diffusion 1.5
# Optimized for RTX Pro 6000 Blackwell (96GB VRAM, 180GB RAM)

model:
  nre:
    sd_model_id: "stable-diffusion-v1-5/stable-diffusion-v1-5"
    controlnet_model_id: "lllyasviel/sd-controlnet-canny"
    style_dim: 512             # Must match SIR output
    num_style_tokens: 4        # Pseudo-tokens for cross-attention injection
    lora_rank: 8
    lora_alpha: 16
    use_lora: true

  # Diffusion settings (informational — scheduler configured in code)
  diffusion:
    num_train_steps: 1000
    num_inference_steps: 50
    scheduler: "ddpm"
    prediction_type: "epsilon"

training:
  # --- Optimized for 96GB VRAM Blackwell ---
  batch_size: 12               # SD 1.5 + ControlNet fits very comfortably at 96GB
  gradient_accumulation: 4     # Effective batch = 48
  max_epochs: 30
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  fp16: true
  gradient_checkpointing: true
  gradient_clip: 1.0
  patience: 15                 # Early stopping patience (epochs)

  # Resolution (lean version: fixed 512x512)
  resolution: 512

  # Loss weights — keys match RenderingLoss constructor
  loss_weights:
    l1: 1.0
    lpips: 0.5
    style: 0.1

data:
  train_dir: "data/synthetic/train"
  val_dir: "data/synthetic/val"
  num_workers: 8               # Maximize data loading throughput
  prefetch_factor: 4
  preload_to_ram: true         # Cache entire dataset in 180GB RAM
  image_size: [512, 512]
  patch_size: 128
  num_patches: 8

logging:
  project: "genome-doc-nre"
  log_every_n_steps: 50
  save_every_n_epochs: 5
